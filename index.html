  <!-- Font loading script -->
  <script type="text/javascript">
  function loadFonts() {
    const head = document.getElementsByTagName('head')[0];

    // Always use local CSS (no Google Fonts)
    const awooLink = document.createElement('link');
    awooLink.rel = 'stylesheet';
    awooLink.type = 'text/css';
    awooLink.href = 'src/css/awoo-local.min.css';
    head.appendChild(awooLink);

    // Load only local fonts
    const localFontLinks = [
      'src/fonts/maple-mono.css',
      'src/fonts/material-icons-local.css'
    ];

    localFontLinks.forEach(href => {
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.type = 'text/css';
      link.href = href;
      head.appendChild(link);
    });

    // Optional: keep cryptofont (already in your <head>)
    const crypto = document.createElement('link');
    crypto.rel = 'stylesheet';
    crypto.href = 'https://cdn.jsdelivr.net/gh/monzanifabio/cryptofont/cryptofont.css';
    head.appendChild(crypto);
  }

  loadFonts();
</script>
